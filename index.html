<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediAssist — Prescription Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LANGUAGE SELECTION SCREEN -->
  <div id="languageScreen" class="fullscreen-overlay">
    <div class="lang-card">
      <div class="lang-logo">
        <div class="logo-circle">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
      </div>
      <h1 class="lang-title">MediAssist</h1>
      <p class="lang-sub">by Nishant &nbsp;·&nbsp; Your Personal Prescription Companion</p>
      <div class="lang-divider"></div>
      <p class="lang-question">Please select your preferred language</p>
      <p class="lang-question-hi">कृपया अपनी भाषा चुनें</p>
      <div class="lang-btns">
        <button class="lang-btn" id="btnEnglish" onclick="selectLanguage('en')">
          <span class="lang-flag">🇬🇧</span>
          <span class="lang-name">English</span>
          <span class="lang-native">Continue in English</span>
        </button>
        <button class="lang-btn" id="btnHindi" onclick="selectLanguage('hi')">
          <span class="lang-flag">🇮🇳</span>
          <span class="lang-name">हिंदी</span>
          <span class="lang-native">हिंदी में जारी रखें</span>
        </button>
      </div>
    </div>
  </div>

  <!-- DISCLAIMER MODAL -->
  <div id="disclaimerOverlay" class="fullscreen-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h2 id="disclaimerTitle"></h2>
      <div id="disclaimerBody"></div>
      <button id="agreeBtn" class="agree-btn" onclick="agreeDisclaimer()"></button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app-container" id="appContainer" style="display:none;">

    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <div>
          <div class="header-title">MediAssist</div>
          <div class="header-sub" id="headerSub"></div>
        </div>
      </div>
      <div class="header-right">
        <div class="chat-pill" id="chatPill">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          <span id="chatCountDisplay"></span>
        </div>
      </div>
    </header>

    <!-- INFO BAR -->
    <div class="info-bar" id="infoBar"></div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
      <div id="uploadSection">
        <!-- Welcome bubble injected by JS -->
        <div id="welcomeBubbleWrap"></div>
        <!-- Upload zone -->
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden />
          <div class="upload-icon-wrap">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
            </svg>
          </div>
          <div class="upload-title" id="uploadTitle"></div>
          <div class="upload-sub" id="uploadSub"></div>
          <button class="upload-btn" id="uploadBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21,15 16,10 5,21"/>
            </svg>
            <span id="uploadBtnText"></span>
          </button>
          <div class="upload-meta" id="uploadMeta"></div>
          <div id="uploadLimitMsg" class="upload-warn" style="display:none;"></div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messagesContainer"></div>

      <!-- Typing -->
      <div id="typingIndicator" class="typing-row" style="display:none;">
        <div class="bot-avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-wrap" id="inputWrap">
        <input type="text" id="chatInput" class="chat-input" disabled />
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <span id="footerText"></span>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
